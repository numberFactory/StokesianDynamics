name: lubrication
channels:
  - conda-forge
dependencies:
  # Pin Python — nvmath-python requires <=3.13, and 3.12 has the broadest
  # compatibility across the scientific stack
  - python=3.12

  # Core numerics
  - numpy
  - scipy
  - matplotlib
  - libMobility
  - scikit-sparse

  # GPU — CuPy and nvmath-python (wraps cuDSS for sparse GPU solvers)
  # nvmath-python requires cuda-version pin to pull in the right cudss wheel
  - cupy
  - cuda-version=12
  - nvmath-python

  # JIT compilation for Python numerical kernels
  - numba

  # Build tools
  - cxx-compiler
  - cmake
  - scikit-build-core
  - eigen
  - nanobind

  # Testing
  - pytest

  # Optional but useful for sparse matrix work
  - pyamg

  # Ensure pip is available for `pip install .`
  - pip
  - pip:
    - pyvista       # for 3D visualization (not on conda-forge consistently)
